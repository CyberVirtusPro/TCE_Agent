version: '3.8'

services:
  # O seu Agente de Auditoria
  tce_agent:
    build: .
    container_name: tce_agent_studio
    ports:
      - "2024:2024"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LANGCHAIN_TRACING_V2=true
    volumes:
      - .:/app
    depends_on:
      - qdrant

  # Banco Vetorial (Unificando com o que você já tem)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_legis:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data_legis: